name: Build Vyshu AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            ninja-build \
            ccache \
            unzip \
            zip \
            openjdk-11-jdk

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64" >> $GITHUB_ENV
          java -version

      - name: Install buildozer
        run: |
          pip3 install --upgrade Cython==0.29.33
          pip3 install --upgrade buildozer

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Find APK
        run: |
          find . -name "*.apk" 2>/dev/null
          ls bin/ 2>/dev/null || echo "No bin/"

      - uses: actions/upload-artifact@v4
        with:
          name: VyshuAI-APK
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/android/platform/build-*/dists/*/build.log
          retention-days: 7
          if-no-files-found: ignore
